version: '3.9'

services:

  frontend:

    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    networks:
      - kavach-network

  backend:

    build: ./backend

    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./backend/.env

    depends_on:
      - db

    networks:
      - kavach-network

  db:

    image: postgres:15

    environment:

      POSTGRES_USER: kavachuser

      POSTGRES_PASSWORD: securepassword

      POSTGRES_DB: kavachops

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - kavach-network

volumes:

  postgres_data:

networks:

  kavach-network:
